<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>简历优化 Agent</title>
<link rel="icon" href="data:,">
<style>
:root{
  --paper:#fbfbf9; --card:#ffffff; --ink:#16181d; --sub:#5f6672; --faint:#a7adb8;
  --hair:#e9e9e4; --hair2:#d8d8d2;
  --signal:#2b5ce6; --ok:#178a50; --warn:#b7791f; --bad:#c2402f;
  --mono:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Segoe UI","Microsoft YaHei",sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{--paper:#15161a; --card:#1c1e24; --ink:#e9eaec; --sub:#9aa1ad; --faint:#5f6672;
        --hair:#2a2c33; --hair2:#363943; --signal:#5b82f0;}
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto;padding:28px 20px 64px}
header{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--hair);margin-bottom:22px}
.mark{width:10px;height:10px;background:var(--ink)}
h1{font-size:15px;font-weight:600;margin:0;letter-spacing:.02em}
.tag{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}
.quota-text{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--sub);white-space:nowrap}
.grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:760px){.grid{grid-template-columns:360px 1fr}}
label{display:block;font-size:12px;color:var(--sub);margin:14px 0 6px}
input[type=text],input[type=password],textarea,select{
  width:100%;background:var(--card);color:var(--ink);border:1px solid var(--hair2);
  border-radius:7px;padding:9px 10px;font-family:var(--sans);font-size:13.5px}
textarea{min-height:150px;resize:vertical;line-height:1.5}
input[type=file]{width:100%;font-size:12.5px;color:var(--sub)}
.row2{display:flex;gap:10px}.row2>div{flex:1}
button{font-family:var(--sans);font-size:13.5px;border-radius:7px;padding:10px 14px;cursor:pointer;border:1px solid var(--hair2);background:var(--card);color:var(--ink)}
.btn-primary{width:100%;margin-top:18px;background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:600}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{width:100%;margin-top:8px;background:transparent;color:var(--sub)}
.toggle-row{display:flex;align-items:center;gap:8px;margin-top:12px;min-height:30px}
.toggle-row label{margin:0;color:var(--ink);cursor:pointer}
.toggle-row input{width:16px;height:16px;margin:0;accent-color:var(--signal)}
.recent-section{margin-top:22px;padding-top:16px;border-top:1px solid var(--hair)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-head h2{font-size:12px;font-weight:600;color:var(--sub);margin:0}
.history-list{list-style:none;margin:0;padding:0;border:1px solid var(--hair);border-radius:7px;overflow:hidden}
.history-item{display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;border-bottom:1px solid var(--hair)}
.history-item:last-child{border-bottom:none}
.history-open{min-width:0;border:0;border-radius:0;padding:9px 10px;text-align:left;background:transparent;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-meta{font-family:var(--mono);font-size:10px;color:var(--faint);padding-right:8px;white-space:nowrap}
.history-delete{border:0;border-left:1px solid var(--hair);border-radius:0;padding:9px 10px;color:var(--faint);background:transparent}
.history-delete:disabled{opacity:.45;cursor:not-allowed}
.history-empty{display:block;padding:10px;color:var(--faint);font-size:11.5px}
.hidden{display:none}
.note{font-size:11.5px;color:var(--faint);margin-top:10px;line-height:1.5}
.stages{list-style:none;margin:0;padding:0;border:1px solid var(--hair);border-radius:9px;overflow:hidden}
.stage{display:block;padding:11px 14px;border-bottom:1px solid var(--hair);font-size:13px;cursor:pointer}
.stage:last-child{border-bottom:none}
.st-main{display:flex;align-items:center;justify-content:space-between;gap:10px}
.st-status{font-family:var(--mono);font-size:11px;color:var(--faint)}
.st-detail{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:7px;line-height:1.6}
.stage[data-state=running]{background:color-mix(in srgb,var(--signal) 8%,transparent)}
.stage[data-state=running] .st-status{color:var(--signal)}
.stage[data-state=completed] .st-status{color:var(--ok)}
.stage[data-state=failed] .st-status,.stage[data-state=skipped] .st-status{color:var(--warn)}
.status-line{font-family:var(--mono);font-size:11px;color:var(--sub);margin:14px 0}
.report{margin-top:18px;background:var(--card);border:1px solid var(--hair);border-radius:9px;padding:18px 20px;line-height:1.6;font-size:13.5px}
.report h1{font-size:17px;margin:.4em 0}.report h2{font-size:15px;margin:1em 0 .4em;color:var(--sub)}
.report h3{font-size:13.5px;margin:.8em 0 .3em}
.report ul{padding-left:20px;margin:.4em 0}.report blockquote{border-left:3px solid var(--hair2);margin:.6em 0;padding:.2em 0 .2em 12px;color:var(--sub)}
.report hr{border:none;border-top:1px solid var(--hair);margin:1em 0}
.report pre{white-space:pre-wrap;font-family:var(--mono);font-size:12px;background:transparent}
.banner{padding:10px 12px;border-radius:7px;font-size:12.5px;margin-top:12px}
.banner.warn{background:color-mix(in srgb,var(--warn) 14%,transparent);color:var(--warn)}
.banner.bad{background:color-mix(in srgb,var(--bad) 14%,transparent);color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="mark"></span>
    <div><h1>简历优化 Agent</h1><div class="tag">Preview</div></div>
    <div class="quota-text" id="quotaText">免费额度 --/--</div>
  </header>

  <div class="grid">
    <section id="formPane">
      <label for="resumeFile">简历文件（PDF / DOCX / TXT / MD，≤4MB）</label>
      <input type="file" id="resumeFile" accept=".pdf,.docx,.txt,.md">

      <label for="jdText">目标职位 JD（必填）</label>
      <textarea id="jdText" placeholder="粘贴目标岗位的职位描述……"></textarea>

      <div class="row2">
        <div>
          <label for="modelSelect">模型</label>
          <select id="modelSelect"></select>
        </div>
        <div>
          <label for="reasoningSelect">推理强度</label>
          <select id="reasoningSelect"></select>
        </div>
      </div>

      <label for="apiKey">自有 API Key（可选）</label>
      <input type="password" id="apiKey" autocomplete="off" spellcheck="false">

      <div class="toggle-row">
        <input type="checkbox" id="mockMode">
        <label for="mockMode">Mock 模式</label>
      </div>

      <button class="btn-primary" id="startBtn">开始分析</button>
      <button class="btn-ghost hidden" id="cancelBtn">取消本次运行</button>
      <div class="note">简历文本会在一天内保留于 Vercel 工作流状态用于本次运行，结束后可删除。自有密钥仅用于本次提交，不会保存在浏览器中。</div>
      <div class="banner bad hidden" id="errBanner"></div>

      <div class="recent-section">
        <div class="section-head"><h2>最近任务</h2></div>
        <ul class="history-list" id="recentRuns"><li class="history-empty">暂无任务</li></ul>
      </div>
    </section>

    <section id="runPane">
      <div class="status-line" id="statusLine">尚未开始</div>
      <ol class="stages" id="stages">
        <li class="stage" data-stage="1" data-state="pending"><div class="st-main"><span>简历解析</span><span class="st-status" id="st-1">待运行</span></div><div class="st-detail hidden" id="std-1"></div></li>
        <li class="stage" data-stage="2" data-state="pending"><div class="st-main"><span>简历信息结构化</span><span class="st-status" id="st-2">待运行</span></div><div class="st-detail hidden" id="std-2"></div></li>
        <li class="stage" data-stage="3" data-state="pending"><div class="st-main"><span>在招岗位发现</span><span class="st-status" id="st-3">待运行</span></div><div class="st-detail hidden" id="std-3"></div></li>
        <li class="stage" data-stage="4" data-state="pending"><div class="st-main"><span>岗位要求分析</span><span class="st-status" id="st-4">待运行</span></div><div class="st-detail hidden" id="std-4"></div></li>
        <li class="stage" data-stage="5" data-state="pending"><div class="st-main"><span>匹配度分析</span><span class="st-status" id="st-5">待运行</span></div><div class="st-detail hidden" id="std-5"></div></li>
        <li class="stage" data-stage="6" data-state="pending"><div class="st-main"><span>简历优化</span><span class="st-status" id="st-6">待运行</span></div><div class="st-detail hidden" id="std-6"></div></li>
        <li class="stage" data-stage="7" data-state="pending"><div class="st-main"><span>真实性审查</span><span class="st-status" id="st-7">待运行</span></div><div class="st-detail hidden" id="std-7"></div></li>
        <li class="stage" data-stage="8" data-state="pending"><div class="st-main"><span>生成报告</span><span class="st-status" id="st-8">待运行</span></div><div class="st-detail hidden" id="std-8"></div></li>
      </ol>
      <div class="note">点击任一阶段行可展开/收起脱敏运行明细（仅耗时、尝试次数、错误类别等状态字段）。</div>
      <div class="banner warn hidden" id="partialBanner"></div>
      <button class="btn-ghost hidden" id="downloadBtn">导出报告（Markdown）</button>
      <div class="report hidden" id="report"></div>
    </section>
  </div>
</div>

<script nonce="__CSP_NONCE__" src="/_vercel/insights/script.js" defer></script>
<script nonce="__CSP_NONCE__" src="/_vercel/speed-insights/script.js" defer></script>
<script nonce="__CSP_NONCE__">
"use strict";
(function(){
  var POLL_MS = 2000;
  var STATE_LABEL = {pending:"待运行", running:"进行中", completed:"完成",
                     failed:"失败", skipped:"跳过", cancelled:"已取消"};
  var pollTimer = null;
  var pollInFlight = false;
  var pollGeneration = 0;
  var historyRequestId = 0;
  var navigationGeneration = 0;
  var activeRunId = "";
  var activeRunTerminal = false;
  var freePerDay = null;

  function $(id){ return document.getElementById(id); }

  function escapeHtml(value){
    return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
    });
  }

  // Escape first, then apply a small markdown subset over safe text only.
  function renderMarkdownSafe(md){
    var lines = escapeHtml(md).split("\n");
    var out = [], listOpen = false;
    function closeList(){ if(listOpen){ out.push("</ul>"); listOpen = false; } }
    for(var i=0;i<lines.length;i++){
      var line = lines[i];
      var inline = line
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+?)`/g, "<code>$1</code>");
      if(/^\s*---\s*$/.test(line)){ closeList(); out.push("<hr>"); continue; }
      var h = /^(#{1,3})\s+(.*)$/.exec(line);
      if(h){ closeList(); var lvl = h[1].length; out.push("<h"+lvl+">"+h[2]+"</h"+lvl+">"); continue; }
      var quote = /^&gt;\s?(.*)$/.exec(inline);
      if(quote){ closeList(); out.push("<blockquote>"+quote[1]+"</blockquote>"); continue; }
      var li = /^\s*[-*]\s+(.*)$/.exec(inline);
      if(li){ if(!listOpen){ out.push("<ul>"); listOpen = true; } out.push("<li>"+li[1]+"</li>"); continue; }
      if(line.trim() === ""){ closeList(); continue; }
      out.push("<p>"+inline+"</p>");
    }
    closeList();
    return out.join("");
  }

  function setError(msg){
    var el = $("errBanner");
    if(!msg){ el.classList.add("hidden"); return; }
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  function setStage(stageId, state, detail){
    var row = document.querySelector('.stage[data-stage="'+stageId+'"]');
    if(!row) return;
    row.setAttribute("data-state", state);
    var label = STATE_LABEL[state] || state;
    if(detail){ label += " · " + detail; }
    $("st-"+stageId).textContent = label;
  }

  // Debug Trace 抽屉：只渲染脱敏状态字段，永不渲染任意字符串为 HTML。
  function setStageDetail(s){
    var box = $("std-" + s.stage_id);
    if(!box) return;
    var parts = [];
    if(s.duration_ms != null){ parts.push("耗时 " + Math.round(s.duration_ms/1000) + "s"); }
    if(s.attempt != null){ parts.push("尝试 " + s.attempt); }
    if(s.revision_round != null){ parts.push("修正轮 " + s.revision_round); }
    if(s.error_category){ parts.push("错误类别 " + s.error_category); }
    if(s.reason){ parts.push("原因 " + s.reason); }
    if(s.validation_status){ parts.push("验证状态 " + s.validation_status); }
    box.textContent = parts.length ? parts.join(" · ") : "暂无明细";
  }

  function toggleStageDetail(event){
    var row = event.target.closest ? event.target.closest(".stage") : null;
    if(!row) return;
    var box = $("std-" + row.getAttribute("data-stage"));
    if(box){ box.classList.toggle("hidden"); }
  }

  function updateQuota(freeLeft, total){
    if(total != null && Number.isFinite(Number(total))){ freePerDay = Number(total); }
    if(freeLeft == null){ return; }
    var left = Math.max(0, Number(freeLeft) || 0);
    $("quotaText").textContent = freePerDay == null
      ? "免费额度 " + left
      : "免费额度 " + left + "/" + freePerDay;
  }

  async function loadConfig(){
    var response = await fetch("/api/config");
    var cfg = await response.json();
    if(!response.ok){ throw new Error(cfg.error || "config unavailable"); }
    var modelSel = $("modelSelect");
    modelSel.textContent = "";
    (cfg.model_options || []).forEach(function(m){
      var opt = document.createElement("option");
      opt.value = m.id; opt.textContent = m.label || m.id;
      opt.setAttribute("data-levels", (m.reasoning_levels || []).join(","));
      opt.setAttribute("data-default", m.default_reasoning || "");
      modelSel.appendChild(opt);
    });
    if(cfg.default_model){ modelSel.value = cfg.default_model; }
    syncReasoning();
    updateQuota(cfg.free_left, cfg.free_per_day);
  }

  function syncReasoning(){
    var opt = $("modelSelect").selectedOptions[0];
    var sel = $("reasoningSelect");
    sel.textContent = "";
    var levels = (opt && opt.getAttribute("data-levels") || "").split(",").filter(Boolean);
    var friendly = {high:"高", xhigh:"极高"};
    levels.forEach(function(lv){
      var o = document.createElement("option");
      o.value = lv; o.textContent = friendly[lv] || lv;
      sel.appendChild(o);
    });
    var def = opt && opt.getAttribute("data-default");
    if(def){ sel.value = def; }
  }

  function terminal(status){
    return ["completed","partial","failed","cancelled","deadline_exceeded"].indexOf(status) !== -1;
  }

  function resetRunView(){
    $("report").classList.add("hidden");
    $("partialBanner").classList.add("hidden");
    $("downloadBtn").classList.add("hidden");
    lastReportMarkdown = "";
    for(var stage=1;stage<=8;stage++){
      setStage(stage, "pending", "");
      var box = $("std-"+stage);
      if(box){ box.textContent = ""; box.classList.add("hidden"); }
    }
  }

  function applyStatus(data){
    (data.stages || []).forEach(function(s){
      var detail = s.duration_ms ? Math.round(s.duration_ms/1000)+"s" : "";
      setStage(s.stage_id, s.status || "pending", detail);
      setStageDetail(s);
    });
    var human = {running:"分析进行中……", completed:"分析完成", partial:"已完成（部分）",
                 failed:"运行失败", cancelled:"已取消", deadline_exceeded:"运行超时"};
    $("statusLine").textContent = human[data.status] || data.status || "";
    activeRunTerminal = terminal(data.status);
    if(terminal(data.status)){
      stopPolling();
      $("cancelBtn").classList.add("hidden");
      $("startBtn").disabled = false;
      renderTerminal(data);
      refreshPublicState();
    }
  }

  var lastReportMarkdown = "";

  function renderTerminal(data){
    var banner = $("partialBanner");
    if(data.status !== "completed"){
      banner.classList.remove("hidden");
      var fixes = (data.unresolved_fixes || []).map(escapeHtml).join("；");
      banner.textContent = "本次结果不完整或未通过严格交付校验，请谨慎使用。" + (fixes ? " 未解决：" + fixes : "");
    } else {
      banner.classList.add("hidden");
    }
    if(data.report){
      lastReportMarkdown = String(data.report);
      var rep = $("report");
      rep.innerHTML = renderMarkdownSafe(data.report);
      rep.classList.remove("hidden");
      $("downloadBtn").classList.remove("hidden");
    }
  }

  function downloadReport(){
    if(!lastReportMarkdown) return;
    var blob = new Blob([lastReportMarkdown], {type:"text/markdown;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var link = document.createElement("a");
    link.href = url;
    link.download = "resume-report.md";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  async function pollOnce(){
    if(!activeRunId){ stopPolling(); return; }
    if(pollInFlight){ return; }
    pollInFlight = true;
    var generation = pollGeneration;
    var requestedRunId = activeRunId;
    try{
      var resp = await fetch("/api/runs/" + encodeURIComponent(requestedRunId));
      if(generation !== pollGeneration || requestedRunId !== activeRunId){ return; }
      if(resp.status === 404){
        stopPolling(); activeRunId = ""; activeRunTerminal = false;
        setError("任务不存在或已过期。");
        $("cancelBtn").classList.add("hidden");
        $("startBtn").disabled = false;
        refreshPublicState(); return;
      }
      var data = await resp.json();
      if(generation !== pollGeneration || requestedRunId !== activeRunId){ return; }
      if(!resp.ok){ setError(data.error || "运行状态暂不可用"); return; }
      setError("");
      applyStatus(data);
    }catch(e){ /* transient network error; keep polling */ }
    finally{
      if(generation === pollGeneration){ pollInFlight = false; }
    }
  }

  function startPolling(runId){
    stopPolling();
    activeRunId = String(runId || "");
    activeRunTerminal = false;
    if(!activeRunId){ return; }
    $("startBtn").disabled = true;
    $("cancelBtn").classList.remove("hidden");
    pollOnce();
    pollTimer = setInterval(pollOnce, POLL_MS);
  }

  function stopPolling(){
    if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
    pollGeneration += 1;
    pollInFlight = false;
  }

  function formatCreatedAt(value){
    var timestamp = Number(value);
    if(!Number.isFinite(timestamp)){ return ""; }
    if(timestamp < 1000000000000){ timestamp *= 1000; }
    try{ return new Date(timestamp).toLocaleString(); }
    catch(e){ return ""; }
  }

  function renderHistory(runs){
    var list = $("recentRuns");
    list.textContent = "";
    if(!runs.length){
      var empty = document.createElement("li");
      empty.className = "history-empty";
      empty.textContent = "暂无任务";
      list.appendChild(empty);
      return;
    }
    runs.forEach(function(run){
      var runId = String(run.run_id || "");
      if(!runId){ return; }
      var item = document.createElement("li");
      item.className = "history-item";
      var button = document.createElement("button");
      button.type = "button";
      button.className = "history-open";
      button.textContent = (run.model || "任务") + " · " + (STATE_LABEL[run.status] || run.status || "运行中");
      button.addEventListener("click", function(){ openRun(runId); });
      var meta = document.createElement("span");
      meta.className = "history-meta";
      meta.textContent = formatCreatedAt(run.created_at);
      var remove = document.createElement("button");
      remove.type = "button";
      remove.className = "history-delete";
      remove.textContent = "删除";
      remove.setAttribute("aria-label", "删除任务");
      var canDelete = terminal(run.status);
      remove.disabled = !canDelete;
      if(canDelete){
        remove.addEventListener("click", function(){ deleteRun(runId); });
      } else {
        remove.title = "运行结束后可删除";
      }
      item.appendChild(button);
      item.appendChild(meta);
      item.appendChild(remove);
      list.appendChild(item);
    });
  }

  async function loadHistory(){
    var requestId = ++historyRequestId;
    var response, data;
    try{
      response = await fetch("/api/runs");
      data = await response.json();
    }catch(error){
      if(requestId !== historyRequestId){ return null; }
      throw error;
    }
    if(requestId !== historyRequestId){ return null; }
    if(!response.ok){ throw new Error(data.error || "history unavailable"); }
    var runs = Array.isArray(data.runs) ? data.runs : [];
    updateQuota(data.free_left, null);
    renderHistory(runs);
    return runs;
  }

  function refreshPublicState(){
    return loadHistory().catch(function(){ /* keep the current view */ });
  }

  function restoreStartButton(){
    $("startBtn").disabled = Boolean(activeRunId && !activeRunTerminal);
  }

  async function recoverActiveRun(expectedGeneration){
    var runs;
    try{ runs = await loadHistory(); }
    catch(e){ return false; }
    if(expectedGeneration !== navigationGeneration){ return false; }
    if(!Array.isArray(runs)){ return false; }
    var active = runs.find(function(run){ return !terminal(run.status); });
    if(!active || !active.run_id){ return false; }
    resetRunView();
    $("statusLine").textContent = "已从最近任务恢复运行";
    startPolling(active.run_id);
    return true;
  }

  function openRun(runId){
    navigationGeneration += 1;
    setError("");
    resetRunView();
    $("statusLine").textContent = "正在载入……";
    startPolling(runId);
  }

  async function deleteRun(runId){
    if(!window.confirm("删除这条任务记录？")){ return; }
    navigationGeneration += 1;
    try{
      var response = await fetch("/api/runs/" + encodeURIComponent(runId), {method:"DELETE"});
      var data = await response.json();
      if(!response.ok){ setError(data.error || "删除失败"); return; }
      if(activeRunId === runId){
        stopPolling(); activeRunId = ""; activeRunTerminal = false; resetRunView();
        $("cancelBtn").classList.add("hidden");
        $("startBtn").disabled = false;
        $("statusLine").textContent = "任务已删除";
      }
      await refreshPublicState();
    }catch(e){ setError("删除失败，请稍后再试"); }
  }

  async function onStart(){
    setError("");
    var jd = $("jdText").value.trim();
    var file = $("resumeFile").files[0];
    if(!file){ setError("请上传简历文件"); return; }
    if(!jd){ setError("请粘贴目标 JD"); return; }
    navigationGeneration += 1;
    var startGeneration = navigationGeneration;

    var fd = new FormData();
    fd.append("jd_text", jd);
    fd.append("model", $("modelSelect").value);
    fd.append("reasoning", $("reasoningSelect").value);
    fd.append("resume_file", file);
    var mockEnabled = $("mockMode").checked;
    fd.append("api_key", mockEnabled ? "" : $("apiKey").value.trim());
    fd.append("mock", mockEnabled ? "1" : "0");
    $("apiKey").value = "";

    $("startBtn").disabled = true;
    resetRunView();
    var resp;
    try{ resp = await fetch("/api/runs", { method:"POST", body: fd }); }
    catch(e){
      if(startGeneration !== navigationGeneration){
        restoreStartButton(); refreshPublicState(); return;
      }
      $("startBtn").disabled = false;
      setError("提交失败，请检查网络后重试");
      return;
    }
    if(startGeneration !== navigationGeneration){
      restoreStartButton(); refreshPublicState(); return;
    }
    if(!resp.ok){
      $("startBtn").disabled = false;
      var errorBody = {};
      try{ errorBody = await resp.json(); }catch(e){}
      if(startGeneration !== navigationGeneration){
        restoreStartButton(); refreshPublicState(); return;
      }
      updateQuota(errorBody.free_left, null);
      setError(errorBody.error || "提交失败");
      if(errorBody.code === "run_start_uncertain"){
        if(await recoverActiveRun(startGeneration)){
          setError("运行已提交，已从最近任务恢复。");
        }
        return;
      }
      if(errorBody.code === "free_quota_exhausted" || errorBody.code === "site_quota_exhausted"){
        $("mockMode").checked = false;
        $("apiKey").disabled = false;
        $("apiKey").focus();
      }
      return;
    }
    var body = await resp.json();
    if(startGeneration !== navigationGeneration){
      restoreStartButton(); refreshPublicState(); return;
    }
    body.status = body.status || "running";
    activeRunId = body.run_id;
    updateQuota(body.free_left, null);
    applyStatus(body);
    startPolling(body.run_id);
    await refreshPublicState();
  }

  async function onCancel(){
    if(!activeRunId){ return; }
    var cancelRunId = activeRunId;
    var cancelGeneration = navigationGeneration;
    try{
      var response = await fetch(
        "/api/runs/" + encodeURIComponent(cancelRunId) + "/cancel",
        {method:"POST"}
      );
      var data = await response.json();
      if(cancelRunId !== activeRunId || cancelGeneration !== navigationGeneration || activeRunTerminal){ return; }
      if(!response.ok){ setError(data.error || "取消请求失败"); return; }
      await refreshPublicState();
      if(cancelRunId !== activeRunId || cancelGeneration !== navigationGeneration || activeRunTerminal){ return; }
    }catch(e){
      if(cancelRunId === activeRunId && cancelGeneration === navigationGeneration && !activeRunTerminal){
        setError("取消请求失败，请稍后重试");
      }
      return;
    }
    $("statusLine").textContent = "正在取消……";
  }

  function syncMock(){
    var enabled = $("mockMode").checked;
    $("apiKey").disabled = enabled;
    if(enabled){ $("apiKey").value = ""; }
  }

  function boot(){
    var bootGeneration = navigationGeneration;
    $("startBtn").addEventListener("click", onStart);
    $("cancelBtn").addEventListener("click", onCancel);
    $("downloadBtn").addEventListener("click", downloadReport);
    $("stages").addEventListener("click", toggleStageDetail);
    $("modelSelect").addEventListener("change", syncReasoning);
    $("mockMode").addEventListener("change", syncMock);
    loadConfig().catch(function(){ setError("无法加载配置"); });
    loadHistory().then(function(runs){
      if(!Array.isArray(runs) || bootGeneration !== navigationGeneration || activeRunId){ return; }
      var active = runs.find(function(run){ return !terminal(run.status); });
      if(active){ startPolling(active.run_id); }
    }).catch(function(){ setError("无法加载最近任务"); });
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", boot);
  } else { boot(); }
})();
</script>
</body>
</html>
